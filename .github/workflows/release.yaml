name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Unit + golden tests (race)
        run: go test -race ./...
      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${platform%/*} arch=${platform#*/}
            bin=pdbq; [ "$os" = windows ] && bin=pdbq.exe
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/$bin" ./cmd/pdbq
            name="pdbq_${VERSION#v}_${os}_${arch}"
            if [ "$os" = windows ]; then
              (cd dist && zip -q "$name.zip" "$bin")
            else
              tar -C dist -czf "dist/$name.tar.gz" "$bin"
            fi
            rm "dist/$bin"
          done
      - name: Checksums
        run: cd dist && sha256sum -- * > checksums.txt
      - name: Create GitHub release
        # Skipped under act (local workflow testing); act sets ACT=true.
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ !env.ACT }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !env.ACT }}
          build-args: VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
