# pdbq reference configuration.
# Generated by `pdbq config example` from the config structs — reference, not for direct use.
# Every key is also settable via env (PDBQ_SECTION_KEY, double underscore for '_' in names)
# or command-line flags; precedence is flags > env > file.

database:
  # PostgreSQL connection URL, e.g. postgres://user:pass@host:5432/db. Also honours standard PG* env vars when empty.
  url: ""
  # Maximum pooled connections.
  max_conns: 10
  # Timeout for establishing a connection.
  connect_timeout: "10s"
  # Per-statement timeout applied to every request (0 disables).
  statement_timeout: "30s"

server:
  # Listen address for the HTTP server.
  addr: ":8080"
  # Serve the GraphiQL playground at / (off by default; enable for development).
  graphiql: false
  # Serve the generated SDL at /schema.graphql (off by default; it reveals every table, column and relation to unauthenticated callers).
  expose_schema: false
  # Overall HTTP request timeout.
  request_timeout: "30s"
  # Maximum accepted request body size in bytes.
  max_body_bytes: 1048576
  # Maximum GraphQL selection depth per operation.
  max_depth: 15
  # Maximum estimated cost (selected fields x list multipliers) per operation.
  max_cost: 10000
  # Maximum rows per page; first/last are clamped to this and it is the default page size when neither is given.
  max_page_size: 100
  # Allowed CORS origins for /graphql (exact match, or '*' for any). Empty disables CORS headers entirely.
  cors_origins: []
  # Gzip responses for clients that send Accept-Encoding: gzip (off by default).
  compression: false
  # Enable Apollo automatic persisted queries: clients send a sha256 hash in the persistedQuery extension and register the document once on a miss (in-memory cache).
  apq: false
  # JSON file mapping sha256 hex hashes to GraphQL documents, preloaded as persisted queries (never evicted).
  persisted_queries_path: ""
  # Reject requests that do not reference a persisted query via the persistedQuery extension (requires apq or persisted_queries_path).
  persisted_only: false

schema:
  # PostgreSQL schemas to expose.
  schemas: ["public"]
  # Boot from this schema cache file instead of introspecting (see pdbq schema dump).
  cache_path: ""
  # Expose PostgreSQL functions as custom queries/mutations.
  functions: true

filters:
  # Only allow filtering on columns covered by an index (default policy).
  indexed_only: true
  # Per-table extra filterable columns, keyed by schema.table, overriding indexed_only.
  allow_columns: {}

rls:
  # Run each request as a switched role with claims exposed via set_config (SET LOCAL). Disabling uses the privileged connection directly and logs a loud warning.
  enabled: true
  # Role assumed for authenticated requests without a role claim.
  default_role: ""
  # Role assumed for unauthenticated requests.
  anonymous_role: "anonymous"
  # JWT claim (or header name in header mode) carrying the database role.
  role_claim: "role"
  # Roles a request may assume via the role claim. Empty allows any role (subject to database grants); default_role and anonymous_role are always allowed.
  allowed_roles: []
  # set_config namespace for request claims, e.g. pdbq.claims.
  claims_prefix: "pdbq.claims"
  auth:
    # Claim source: 'jwt', 'headers' (behind a trusted gateway), or 'none'.
    mode: "jwt"
    # HMAC secret for HS256/384/512 verification (jwt mode; ignored when jwks_url is set).
    jwt_secret: ""
    # JWKS endpoint for asymmetric JWT verification (RS256/384/512, ES256/384/512). Takes precedence over jwt_secret.
    jwks_url: ""
    # How long fetched JWKS keys are cached; an unknown kid triggers an early refresh (key rotation).
    jwks_cache_ttl: "1h0m0s"
    # Expected iss claim; empty skips the check.
    jwt_issuer: ""
    # Expected aud claim; empty skips the check.
    jwt_audience: ""
    # Header prefix mapped to claims in headers mode, e.g. X-Pdbq-Claim-.
    header_prefix: "X-Pdbq-Claim-"
    # Schema-qualified composite type (e.g. public.jwt) minted into a signed JWT: any function returning it yields an HS256 token string built from the composite's fields (an exp field becomes the token expiry). Requires jwt_secret; jwt_issuer/jwt_audience are embedded when set. Empty disables minting.
    jwt_type: ""

transactions:
  # Wrap every mutation in a transaction.
  mutations: true
  # Use one transaction for the whole request instead of one per operation.
  per_request: false
  # Transaction isolation level: read_committed, repeatable_read, serializable.
  isolation: "read_committed"
  # Automatic retries of a transactional operation after a serialization failure or deadlock (SQLSTATE 40001/40P01). 0 disables; the whole operation re-runs, which is safe because the failed attempt rolled back.
  max_retries: 0

watch:
  # Re-introspect and hot-swap the schema on DDL changes (dev only; refuses to combine with schema.cache_path).
  enabled: false
  # Poll interval used when event triggers cannot be installed.
  poll_interval: "5s"
  # NOTIFY channel used by the DDL event trigger.
  channel: "pdbq_ddl"

errors:
  # 'dev' exposes full PostgreSQL error detail in GraphQL errors; 'prod' returns sanitized messages with a correlation id.
  detail: "prod"

plugins:
  # Plugin names to disable.
  disabled: []
  # Per-plugin configuration, keyed by plugin name.
  settings: {}

log:
  # Log level: debug, info, warn, error.
  level: "info"
  # Log format: text or json.
  format: "text"

